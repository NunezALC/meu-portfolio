<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Palyer de Vídeo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-3">
       <a href="../../index.html" class="text-decoration-none">← Voltar para o início</a>
    </div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="player-wrapper shadow-lg bg-white p-3 rounded-4">
                   <video id="video-principal" class="w-100 rounded-3">
                      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                   </video>

                   <div class="contrles-custom mt-3">
                        <input type="range" id="barra-progresso" class="form-range" value="0" step="0.1">
  
                     <div class="d-flex align-items-center justify-content-between mt-2">
                        <button id="btn-play-pause" class="btn btn-primary px-4">Play</button>
                        <button id="btn-mute" class="btn btn-outline-secondary ms-2">Mudo</button>
                        <span id="tempo-atual" class="text-muted small">00:00</span>
                     </div>
                   </div>
                </div>
                <div class="text-center mt-4">
                    <a href="../../index.html" class="text-decoration-none text-secondary">← Voltar para o Portfólio</a>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
